name: whatsapp_sender
description: WhatsApp Sender
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  webview_flutter: ^4.8.0
  webview_windows: ^0.4.0
  file_picker: ^8.1.6
  path_provider: ^2.1.3
  path: ^1.9.0
  uuid: ^4.5.1
  mime: ^1.0.5
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/ws2.png"
  windows:
    generate: true
    image_path: "assets/ws2.png"
    icon_size: 256
  remove_alpha_ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/ws2.png
